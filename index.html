<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Hack time | ForceNet & SeKoPrime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s, box-shadow 0.2s;
        }

        :root {
            --bg-primary: #0a0c12;
            --bg-secondary: #10131c;
            --bg-card: rgba(18, 22, 35, 0.85);
            --border-glow: rgba(0, 255, 255, 0.2);
            --text-main: #eef5ff;
            --text-dim: #9aa8c7;
            --accent-cyan: #00f2fe;
            --accent-purple: #a855f7;
            --accent-pink: #ff4d8c;
            --gradient-btn: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --shadow-neon: 0 8px 20px rgba(0, 242, 254, 0.15);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.4);
            --card-radius: 1.5rem;
        }

        body.light {
            --bg-primary: #f2f5fc;
            --bg-secondary: #e6edf6;
            --bg-card: rgba(255, 255, 255, 0.9);
            --border-glow: rgba(0, 180, 230, 0.4);
            --text-main: #0a1128;
            --text-dim: #2c3e66;
            --accent-cyan: #0077b6;
            --accent-purple: #7b2cbf;
            --accent-pink: #d43f7a;
            --gradient-btn: linear-gradient(135deg, #0077b6, #00b4d8);
            --shadow-neon: 0 8px 20px rgba(0, 119, 182, 0.2);
            --shadow-sm: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            line-height: 1.5;
        }

        .gradient-orb {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(0,242,254,0.06) 0%, rgba(168,85,247,0.03) 100%);
            border-radius: 50%;
            top: -20vh;
            right: -20vw;
            z-index: 0;
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-glow);
        }

        .logo-area h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-area p {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .theme-switch {
            background: var(--bg-secondary);
            backdrop-filter: blur(4px);
            padding: 0.4rem;
            border-radius: 60px;
            display: flex;
            gap: 0.5rem;
            border: 1px solid var(--border-glow);
        }

        .theme-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-dim);
        }

        .theme-btn.active {
            background: var(--gradient-btn);
            color: #fff;
            box-shadow: var(--shadow-neon);
        }

        .refresh-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            color: var(--accent-cyan);
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 1rem;
        }

        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .post-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: var(--card-radius);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-neon);
            border-color: var(--accent-cyan);
        }

        .post-content {
            padding: 1.8rem;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            border-bottom: 1px dashed var(--border-glow);
            padding-bottom: 0.5rem;
        }

        .post-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            background: rgba(0, 242, 254, 0.15);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            letter-spacing: 1px;
            color: var(--accent-cyan);
        }

        .post-date {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: monospace;
        }

        .post-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0.75rem 0 0.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        body.light .post-title {
            background: linear-gradient(135deg, #0a1128, var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
        }

        .post-text {
            margin: 1.2rem 0;
            color: var(--text-dim);
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        .media-container {
            margin: 1.2rem 0;
            border-radius: 1rem;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .post-img {
            max-width: 100%;
            border-radius: 1rem;
            display: block;
            border: 1px solid var(--border-glow);
        }

        .post-video {
            width: 100%;
            border-radius: 1rem;
            outline: none;
            background: #000;
        }

        .file-download {
            background: var(--bg-secondary);
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
            color: var(--accent-cyan);
            border: 1px solid var(--border-glow);
            transition: 0.2s;
            font-weight: 500;
        }

        .file-download:hover {
            background: var(--accent-cyan);
            color: #0a0c12;
            border-color: var(--accent-cyan);
        }

        .empty-message {
            text-align: center;
            padding: 3rem;
            background: var(--bg-card);
            border-radius: 2rem;
            color: var(--text-dim);
        }

        .footer-note {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px dashed var(--border-glow);
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        @media (max-width: 680px) {
            .wrapper { padding: 1rem; }
            .post-title { font-size: 1.3rem; }
            .post-content { padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="gradient-orb"></div>
<div class="wrapper">
    <div class="header">
        <div class="logo-area">
            <h1>⧩ HACK TIME</h1>
            <p>ForceNet | SeKoPrime</p>
        </div>
        <div style="display: flex; gap: 0.8rem; align-items: center;">
            <button class="refresh-btn" id="scanBtn">🔄 Обновить список постов</button>
            <div class="theme-switch" id="themeToggleGroup">
                <button class="theme-btn active" data-theme="dark">🌙 Dark</button>
                <button class="theme-btn" data-theme="light">☀️ Light</button>
            </div>
        </div>
    </div>

    <div id="postsContainer" class="posts-grid">
        <div class="empty-message">⏳ загрузка...</div>
    </div>

    <div class="footer-note">
        ForceNet & SeKoPrime — посты в одной папке с index.html, имя начинается с post_
    </div>
</div>

<script>
    // ========== ТЕМА ==========
    const themeBtns = document.querySelectorAll('.theme-btn');
    const bodyEl = document.body;

    function setTheme(theme) {
        if(theme === 'light') {
            bodyEl.classList.add('light');
            localStorage.setItem('hacktime_theme', 'light');
            themeBtns.forEach(btn => {
                if(btn.getAttribute('data-theme') === 'light') btn.classList.add('active');
                else btn.classList.remove('active');
            });
        } else {
            bodyEl.classList.remove('light');
            localStorage.setItem('hacktime_theme', 'dark');
            themeBtns.forEach(btn => {
                if(btn.getAttribute('data-theme') === 'dark') btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
    }

    const savedTheme = localStorage.getItem('hacktime_theme');
    if(savedTheme === 'light') setTheme('light');
    else setTheme('dark');

    themeBtns.forEach(btn => {
        btn.addEventListener('click', () => setTheme(btn.getAttribute('data-theme')));
    });

    // ========== ПОСТЫ ==========
    const postsContainer = document.getElementById('postsContainer');
    const scanBtn = document.getElementById('scanBtn');

    // Генерация списка постов через попытку загрузки (перебираем возможные имена)
    // Но самый надёжный способ — создать posts_list.json вручную один раз
    // Сделаем так: если есть posts_list.json — читаем его, иначе показываем инструкцию
    // + кнопка "обновить" создаёт этот файл через скачивание (вручную сохранить)
    
    let currentPostsList = [];

    async function loadPostsList() {
        try {
            const res = await fetch('posts_list.json?nocache=' + Date.now());
            if(res.ok) {
                const list = await res.json();
                if(Array.isArray(list)) {
                    currentPostsList = list.filter(name => name.startsWith('post') && name.endsWith('.html')).map(n => n.replace('.html', ''));
                    return true;
                }
            }
        } catch(e) {}
        return false;
    }

    async function loadPost(postName) {
        const url = `${postName}.html`;
        try {
            const res = await fetch(url);
            if(!res.ok) return null;
            const htmlText = await res.text();
            return parsePostHTML(htmlText, postName);
        } catch(err) {
            return null;
        }
    }

    function parsePostHTML(html, postId) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        let title = doc.querySelector('post-title')?.innerText || doc.title || postId;
        let textContent = doc.querySelector('post-text')?.innerHTML || doc.querySelector('post-text')?.innerText || '';
        
        let type = 1;
        let imgSrc = null;
        let videoSrc = null;
        let fileUrl = null;
        let fileName = null;
        
        const imgTag = doc.querySelector('post-img');
        if(imgTag) {
            type = 1;
            imgSrc = imgTag.getAttribute('src');
        }
        
        const videoTag = doc.querySelector('post-video');
        if(videoTag) {
            const src = videoTag.getAttribute('src');
            if(src) {
                type = 2;
                videoSrc = src;
            }
        }
        
        const fileTag = doc.querySelector('post-file');
        if(fileTag) {
            const fUrl = fileTag.getAttribute('src');
            const fName = fileTag.getAttribute('name') || fUrl?.split('/').pop() || 'download';
            if(videoSrc) {
                type = 3;
                fileUrl = fUrl;
                fileName = fName;
            } else {
                type = 4;
                fileUrl = fUrl;
                fileName = fName;
            }
        }
        
        if(fileTag && !videoSrc) type = 4;
        else if(videoSrc && !fileTag) type = 2;
        else if(videoSrc && fileTag) type = 3;
        else if(imgSrc) type = 1;
        
        let dateStr = doc.querySelector('post-date')?.getAttribute('value') || 
                      doc.querySelector('post-date')?.innerText || 
                      new Date().toLocaleDateString();
        
        function fixPath(path) {
            if(!path) return null;
            if(path.startsWith('http') || path.startsWith('//')) return path;
            return path;
        }
        
        if(imgSrc) imgSrc = fixPath(imgSrc);
        if(videoSrc) videoSrc = fixPath(videoSrc);
        if(fileUrl) fileUrl = fixPath(fileUrl);
        
        return {
            id: postId,
            title: title.trim(),
            text: textContent,
            type: type,
            img: imgSrc,
            video: videoSrc,
            fileUrl: fileUrl,
            fileName: fileName,
            date: dateStr,
            rawTimestamp: (() => {
                const match = postId.match(/post_(\d{8})/);
                return match ? parseInt(match[1]) : 0;
            })()
        };
    }
    
    function renderPost(post) {
        const card = document.createElement('div');
        card.className = 'post-card';
        
        let mediaHTML = '';
        if(post.type === 1 && post.img) {
            mediaHTML = `<div class="media-container"><img class="post-img" src="${post.img}" alt="preview" loading="lazy" onerror="this.style.display='none'"></div>`;
        } 
        else if(post.type === 2 && post.video) {
            mediaHTML = `<div class="media-container"><video class="post-video" controls preload="metadata"><source src="${post.video}">Ваш браузер не поддерживает видео</video></div>`;
        }
        else if(post.type === 3 && post.video && post.fileUrl) {
            mediaHTML = `<div class="media-container">
                            <video class="post-video" controls preload="metadata"><source src="${post.video}"></video>
                            <a class="file-download" href="${post.fileUrl}" download="${post.fileName}">📎 Скачать файл: ${post.fileName}</a>
                         </div>`;
        }
        else if(post.type === 4 && post.fileUrl) {
            mediaHTML = `<div class="media-container">
                            <a class="file-download" href="${post.fileUrl}" download="${post.fileName}">📁 Скачать файл: ${post.fileName}</a>
                         </div>`;
        }
        
        const typeLabel = post.type === 1 ? '📸 ФОТО' : (post.type === 2 ? '🎥 ВИДЕО' : (post.type === 3 ? '🎬 ВИДЕО + ФАЙЛ' : '📦 ФАЙЛ'));
        
        card.innerHTML = `
            <div class="post-content">
                <div class="post-header">
                    <span class="post-type">${typeLabel}</span>
                    <span class="post-date">${escapeHtml(post.date)}</span>
                </div>
                <div class="post-title">${escapeHtml(post.title)}</div>
                ${post.text ? `<div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>` : ''}
                ${mediaHTML}
            </div>
        `;
        return card;
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    async function displayPosts() {
        postsContainer.innerHTML = '<div class="empty-message">⏳ загрузка постов...</div>';
        
        if(currentPostsList.length === 0) {
            postsContainer.innerHTML = `<div class="empty-message">
                📭 Нет списка постов.<br><br>
                <strong>Как добавить пост:</strong><br>
                1. Создай файл post_название.html (рядом с index.html)<br>
                2. Напиши внутри по шаблону (см. консоль или пример ниже)<br>
                3. Нажми «Обновить список постов» → сохрани posts_list.json<br><br>
                <button id="createExampleBtn" style="background:var(--accent-cyan); border:none; padding:8px 20px; border-radius:30px; cursor:pointer;">📝 Создать пример поста</button>
            </div>`;
            const exampleBtn = document.getElementById('createExampleBtn');
            if(exampleBtn) {
                exampleBtn.onclick = () => createExamplePost();
            }
            return;
        }
        
        const loadedPosts = [];
        for(const postName of currentPostsList) {
            const postData = await loadPost(postName);
            if(postData) loadedPosts.push(postData);
        }
        
        loadedPosts.sort((a,b) => {
            if(a.rawTimestamp !== b.rawTimestamp) return b.rawTimestamp - a.rawTimestamp;
            return b.id.localeCompare(a.id);
        });
        
        if(loadedPosts.length === 0) {
            postsContainer.innerHTML = `<div class="empty-message">⚠️ Посты найдены, но не загрузились. Проверь имена файлов.</div>`;
            return;
        }
        
        postsContainer.innerHTML = '';
        for(const post of loadedPosts) {
            postsContainer.appendChild(renderPost(post));
        }
    }
    
    // Сканирование: генерируем posts_list.json перебором вероятных имён
    // Самый простой способ для пользователя — вручную создать posts_list.json
    // Но сделаем "умное сканирование": пробуем fetch до 50 вариантов post_1 ... post_50
    async function smartScan() {
        postsContainer.innerHTML = '<div class="empty-message">🔍 Сканирование: ищем post_*.html...</div>';
        const found = [];
        for(let i = 1; i <= 50; i++) {
            const testName = `post_${i}`;
            const res = await fetch(`${testName}.html`, { method: 'HEAD' });
            if(res.ok) {
                found.push(`${testName}.html`);
            }
            // небольшая задержка чтобы не спамить
            await new Promise(r => setTimeout(r, 10));
        }
        
        if(found.length > 0) {
            // сохраняем в localStorage и предлагаем скачать posts_list.json
            localStorage.setItem('hacktime_posts_list', JSON.stringify(found));
            currentPostsList = found.map(f => f.replace('.html', ''));
            alert(`Найдено ${found.length} постов! Чтобы они сохранились навсегда, нажми ОК и сохрани файл.`);
            downloadPostsList(found);
        } else {
            alert('Не найдено ни одного post_*.html. Создай файл типа post_1.html');
            currentPostsList = [];
        }
        await displayPosts();
    }
    
    function downloadPostsList(list) {
        const data = JSON.stringify(list, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'posts_list.json';
        a.click();
        URL.revokeObjectURL(url);
    }
    
    async function createExamplePost() {
        const exampleContent = `<title>Пример поста ForceNet</title>
<post-text>Это пример поста. Видео/фото клади рядом с index.html и указывай просто имя файла.</post-text>
<post-img src="example.png"></post-img>
<post-file src="script.py" name="exploit.py"></post-file>`;
        
        const blob = new Blob([exampleContent], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'post_example.html';
        a.click();
        URL.revokeObjectURL(url);
        alert('Пример поста скачан. Положи его рядом с index.html и создай example.png/script.py по желанию. Потом нажми "Обновить список постов"');
    }
    
    // Инициализация
    async function init() {
        const hasList = await loadPostsList();
        if(hasList) {
            await displayPosts();
        } else {
            // пробуем восстановить из localStorage
            const saved = localStorage.getItem('hacktime_posts_list');
            if(saved) {
                try {
                    const parsed = JSON.parse(saved);
                    currentPostsList = parsed.map(f => f.replace('.html', ''));
                    await displayPosts();
                } catch(e) { startEmpty(); }
            } else {
                startEmpty();
            }
        }
    }
    
    function startEmpty() {
        currentPostsList = [];
        displayPosts();
    }
    
    scanBtn.onclick = async () => {
        await smartScan();
    };
    
    init();
</script>

<!-- ========== ШАБЛОНЫ ПОСТОВ ========== -->
<!-- 
    КАК СОЗДАТЬ ПОСТ:
    Файл должен лежать РЯДОМ с index.html, имя начинаться с post_ (например post_1.html, post_myhack.html)
    
    Внутри файла используй теги:
    
    1. ФОТО (.png):
    <title>Название</title>
    <post-text>текст</post-text>
    <post-img src="kartinka.png"></post-img>
    
    2. ВИДЕО:
    <title>Название</title>
    <post-text>текст</post-text>
    <post-video src="video.mp4"></post-video>
    
    3. ВИДЕО + ФАЙЛ:
    <title>Название</title>
    <post-text>текст</post-text>
    <post-video src="video.mp4"></post-video>
    <post-file src="arhiv.zip" name="skript.zip"></post-file>
    
    4. ТОЛЬКО ФАЙЛ:
    <title>Название</title>
    <post-text>текст</post-text>
    <post-file src="skript.py" name="payload.py"></post-file>
    
    ВСЕ МЕДИАФАЙЛЫ (фото/видео/архивы) КЛАДИ РЯДОМ С index.html, В ПУТИ УКАЗЫВАЙ ТОЛЬКО ИМЯ ФАЙЛА
-->
</body>
</html>
