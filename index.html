<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Hack time | ForceNet & SeKoPrime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s, box-shadow 0.2s;
        }

        :root {
            --bg-primary: #0a0c12;
            --bg-secondary: #10131c;
            --bg-card: rgba(18, 22, 35, 0.85);
            --border-glow: rgba(0, 255, 255, 0.2);
            --text-main: #eef5ff;
            --text-dim: #9aa8c7;
            --accent-cyan: #00f2fe;
            --accent-purple: #a855f7;
            --accent-pink: #ff4d8c;
            --gradient-btn: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --shadow-neon: 0 8px 20px rgba(0, 242, 254, 0.15);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.4);
            --card-radius: 1.5rem;
        }

        body.light {
            --bg-primary: #f2f5fc;
            --bg-secondary: #e6edf6;
            --bg-card: rgba(255, 255, 255, 0.9);
            --border-glow: rgba(0, 180, 230, 0.4);
            --text-main: #0a1128;
            --text-dim: #2c3e66;
            --accent-cyan: #0077b6;
            --accent-purple: #7b2cbf;
            --accent-pink: #d43f7a;
            --gradient-btn: linear-gradient(135deg, #0077b6, #00b4d8);
            --shadow-neon: 0 8px 20px rgba(0, 119, 182, 0.2);
            --shadow-sm: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            line-height: 1.5;
        }

        .gradient-orb {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(0,242,254,0.06) 0%, rgba(168,85,247,0.03) 100%);
            border-radius: 50%;
            top: -20vh;
            right: -20vw;
            z-index: 0;
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-glow);
        }

        .logo-area h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-area p {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .theme-switch {
            background: var(--bg-secondary);
            backdrop-filter: blur(4px);
            padding: 0.4rem;
            border-radius: 60px;
            display: flex;
            gap: 0.5rem;
            border: 1px solid var(--border-glow);
        }

        .theme-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-dim);
        }

        .theme-btn.active {
            background: var(--gradient-btn);
            color: #fff;
            box-shadow: var(--shadow-neon);
        }

        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .post-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: var(--card-radius);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-neon);
            border-color: var(--accent-cyan);
        }

        .post-content {
            padding: 1.8rem;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            border-bottom: 1px dashed var(--border-glow);
            padding-bottom: 0.5rem;
        }

        .post-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            background: rgba(0, 242, 254, 0.15);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            letter-spacing: 1px;
            color: var(--accent-cyan);
        }

        .post-date {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: monospace;
        }

        .post-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0.75rem 0 0.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        body.light .post-title {
            background: linear-gradient(135deg, #0a1128, var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
        }

        .post-text {
            margin: 1.2rem 0;
            color: var(--text-dim);
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        .media-container {
            margin: 1.2rem 0;
            border-radius: 1rem;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .post-img {
            max-width: 100%;
            border-radius: 1rem;
            display: block;
            border: 1px solid var(--border-glow);
        }

        .post-video {
            width: 100%;
            border-radius: 1rem;
            outline: none;
            background: #000;
        }

        .file-download {
            background: var(--bg-secondary);
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
            color: var(--accent-cyan);
            border: 1px solid var(--border-glow);
            transition: 0.2s;
            font-weight: 500;
        }

        .file-download:hover {
            background: var(--accent-cyan);
            color: #0a0c12;
            border-color: var(--accent-cyan);
        }

        .empty-message {
            text-align: center;
            padding: 3rem;
            background: var(--bg-card);
            border-radius: 2rem;
            color: var(--text-dim);
        }

        .footer-note {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px dashed var(--border-glow);
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        @media (max-width: 680px) {
            .wrapper { padding: 1rem; }
            .post-title { font-size: 1.3rem; }
            .post-content { padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="gradient-orb"></div>
<div class="wrapper">
    <div class="header">
        <div class="logo-area">
            <h1>⧩ HACK TIME</h1>
            <p></p>
        </div>
        <div class="theme-switch" id="themeToggleGroup">
            <button class="theme-btn active" data-theme="dark">🌙 Dark</button>
            <button class="theme-btn" data-theme="light">☀️ Light</button>
        </div>
    </div>

    <div id="postsContainer" class="posts-grid">
        <div class="empty-message">⏳ загрузка...</div>
    </div>

    <div class="footer-note">
        ForceNet & SeKoPrime
    </div>
</div>

<script>
    // ========== ТЕМА ==========
    const themeBtns = document.querySelectorAll('.theme-btn');
    const bodyEl = document.body;

    function setTheme(theme) {
        if(theme === 'light') {
            bodyEl.classList.add('light');
            localStorage.setItem('hacktime_theme', 'light');
            themeBtns.forEach(btn => {
                if(btn.getAttribute('data-theme') === 'light') btn.classList.add('active');
                else btn.classList.remove('active');
            });
        } else {
            bodyEl.classList.remove('light');
            localStorage.setItem('hacktime_theme', 'dark');
            themeBtns.forEach(btn => {
                if(btn.getAttribute('data-theme') === 'dark') btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
    }

    const savedTheme = localStorage.getItem('hacktime_theme');
    if(savedTheme === 'light') setTheme('light');
    else setTheme('dark');

    themeBtns.forEach(btn => {
        btn.addEventListener('click', () => setTheme(btn.getAttribute('data-theme')));
    });

    // ========== АВТОМАТИЧЕСКОЕ ОБНАРУЖЕНИЕ ПОСТОВ ==========
    // Без JSON, без кнопок. Просто ищем все post_*.html перебором до 200
    
    const postsContainer = document.getElementById('postsContainer');
    
    async function findPosts() {
        const found = [];
        // перебираем post_1.html ... post_200.html и post_любоеимя.html через Head запросы
        // сначала числовые
        for(let i = 1; i <= 200; i++) {
            const name = `post_${i}`;
            const url = `${name}.html`;
            try {
                const res = await fetch(url, { method: 'HEAD' });
                if(res.ok) found.push(name);
            } catch(e) {}
        }
        
        // дополнительные имена: post_ + латиница (если есть)
        const extraNames = [
            'post_example', 'post_demo', 'post_tutorial', 'post_script', 'post_tool'
        ];
        for(const name of extraNames) {
            const url = `${name}.html`;
            try {
                const res = await fetch(url, { method: 'HEAD' });
                if(res.ok && !found.includes(name)) found.push(name);
            } catch(e) {}
        }
        
        return found;
    }
    
    async function loadPost(postName) {
        const url = `${postName}.html`;
        try {
            const res = await fetch(url);
            if(!res.ok) return null;
            const htmlText = await res.text();
            return parsePostHTML(htmlText, postName);
        } catch(err) {
            return null;
        }
    }
    
    function parsePostHTML(html, postId) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        let title = doc.querySelector('post-title')?.innerText || doc.title || postId;
        let textContent = doc.querySelector('post-text')?.innerHTML || doc.querySelector('post-text')?.innerText || '';
        
        let type = 1;
        let imgSrc = null;
        let videoSrc = null;
        let fileUrl = null;
        let fileName = null;
        
        const imgTag = doc.querySelector('post-img');
        if(imgTag) {
            type = 1;
            imgSrc = imgTag.getAttribute('src');
        }
        
        const videoTag = doc.querySelector('post-video');
        if(videoTag) {
            const src = videoTag.getAttribute('src');
            if(src) {
                type = 2;
                videoSrc = src;
            }
        }
        
        const fileTag = doc.querySelector('post-file');
        if(fileTag) {
            const fUrl = fileTag.getAttribute('src');
            const fName = fileTag.getAttribute('name') || fUrl?.split('/').pop() || 'download';
            if(videoSrc) {
                type = 3;
                fileUrl = fUrl;
                fileName = fName;
            } else {
                type = 4;
                fileUrl = fUrl;
                fileName = fName;
            }
        }
        
        if(fileTag && !videoSrc) type = 4;
        else if(videoSrc && !fileTag) type = 2;
        else if(videoSrc && fileTag) type = 3;
        else if(imgSrc) type = 1;
        
        let dateStr = doc.querySelector('post-date')?.getAttribute('value') || 
                      doc.querySelector('post-date')?.innerText || 
                      new Date().toLocaleDateString();
        
        // Извлекаем timestamp из имени поста (post_20250320_название)
        let timestamp = 0;
        const dateMatch = postId.match(/post_(\d{8})/);
        if(dateMatch) timestamp = parseInt(dateMatch[1]);
        else {
            // если нет даты в имени, используем порядковый номер как fallback
            const numMatch = postId.match(/post_(\d+)/);
            if(numMatch) timestamp = parseInt(numMatch[1]);
        }
        
        return {
            id: postId,
            title: title.trim(),
            text: textContent,
            type: type,
            img: imgSrc,
            video: videoSrc,
            fileUrl: fileUrl,
            fileName: fileName,
            date: dateStr,
            timestamp: timestamp
        };
    }
    
    function renderPost(post) {
        const card = document.createElement('div');
        card.className = 'post-card';
        
        let mediaHTML = '';
        if(post.type === 1 && post.img) {
            mediaHTML = `<div class="media-container"><img class="post-img" src="${post.img}" alt="preview" loading="lazy" onerror="this.style.display='none'"></div>`;
        } 
        else if(post.type === 2 && post.video) {
            mediaHTML = `<div class="media-container"><video class="post-video" controls preload="metadata"><source src="${post.video}"></video></div>`;
        }
        else if(post.type === 3 && post.video && post.fileUrl) {
            mediaHTML = `<div class="media-container">
                            <video class="post-video" controls preload="metadata"><source src="${post.video}"></video>
                            <a class="file-download" href="${post.fileUrl}" download="${post.fileName}">📎 Скачать файл: ${post.fileName}</a>
                         </div>`;
        }
        else if(post.type === 4 && post.fileUrl) {
            mediaHTML = `<div class="media-container">
                            <a class="file-download" href="${post.fileUrl}" download="${post.fileName}">📁 Скачать файл: ${post.fileName}</a>
                         </div>`;
        }
        
        const typeLabel = post.type === 1 ? '📸 ФОТО' : (post.type === 2 ? '🎥 ВИДЕО' : (post.type === 3 ? '🎬 ВИДЕО + ФАЙЛ' : '📦 ФАЙЛ'));
        
        function escape(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        card.innerHTML = `
            <div class="post-content">
                <div class="post-header">
                    <span class="post-type">${typeLabel}</span>
                    <span class="post-date">${escape(post.date)}</span>
                </div>
                <div class="post-title">${escape(post.title)}</div>
                ${post.text ? `<div class="post-text">${escape(post.text).replace(/\n/g, '<br>')}</div>` : ''}
                ${mediaHTML}
            </div>
        `;
        return card;
    }
    
    async function loadAllPosts() {
        postsContainer.innerHTML = '<div class="empty-message">⏳ загрузка...</div>';
        
        const postNames = await findPosts();
        
        if(postNames.length === 0) {
            postsContainer.innerHTML = `<div class="empty-message">
                📭 Нет постов.<br><br>
                <strong>Как создать пост:</strong><br>
                1. Создай файл <code>post_1.html</code> (или post_любоеимя.html)<br>
                2. Вставь внутрь шаблон:<br>
                <code style="display:block;background:#00000033;padding:1rem;border-radius:1rem;margin-top:0.5rem;">
                &lt;title&gt;Название поста&lt;/title&gt;<br>
                &lt;post-text&gt;Текст описания&lt;/post-text&gt;<br>
                &lt;post-img src="foto.png"&gt;&lt;/post-img&gt;<br>
                &lt;post-file src="script.py" name="script.py"&gt;&lt;/post-file&gt;
                </code><br>
                3. Положи рядом с index.html<br>
                4. Обнови страницу — пост появится автоматически
            </div>`;
            return;
        }
        
        const loadedPosts = [];
        for(const name of postNames) {
            const post = await loadPost(name);
            if(post) loadedPosts.push(post);
        }
        
        // сортировка: новые сверху (чем больше timestamp, тем новее)
        loadedPosts.sort((a,b) => b.timestamp - a.timestamp);
        
        if(loadedPosts.length === 0) {
            postsContainer.innerHTML = '<div class="empty-message">⚠️ Посты найдены, но не загрузились</div>';
            return;
        }
        
        postsContainer.innerHTML = '';
        for(const post of loadedPosts) {
            postsContainer.appendChild(renderPost(post));
        }
    }
    
    // запуск
    loadAllPosts();
</script>

<!-- ========== ШАБЛОНЫ ПОСТОВ ========== -->
<!-- 
    КАК СОЗДАТЬ ПОСТ:
    
    Файл должен лежать РЯДОМ с index.html, имя начинается с post_ (например post_1.html, post_myhack.html)
    
    Внутри файла используй теги:
    
    ┌─────────────────────────────────────────────────────┐
    │ 1. ФОТО (.png)                                      │
    ├─────────────────────────────────────────────────────┤
    │ <title>Название</title>                             │
    │ <post-text>текст</post-text>                        │
    │ <post-img src="kartinka.png"></post-img>            │
    └─────────────────────────────────────────────────────┘
    
    ┌─────────────────────────────────────────────────────┐
    │ 2. ВИДЕО                                            │
    ├─────────────────────────────────────────────────────┤
    │ <title>Название</title>                             │
    │ <post-text>текст</post-text>                        │
    │ <post-video src="video.mp4"></post-video>           │
    └─────────────────────────────────────────────────────┘
    
    ┌─────────────────────────────────────────────────────┐
    │ 3. ВИДЕО + ФАЙЛ                                     │
    ├─────────────────────────────────────────────────────┤
    │ <title>Название</title>                             │
    │ <post-text>текст</post-text>                        │
    │ <post-video src="video.mp4"></post-video>           │
    │ <post-file src="arhiv.zip" name="skript.zip"></post-file> │
    └─────────────────────────────────────────────────────┘
    
    ┌─────────────────────────────────────────────────────┐
    │ 4. ТОЛЬКО ФАЙЛ                                      │
    ├─────────────────────────────────────────────────────┤
    │ <title>Название</title>                             │
    │ <post-text>текст</post-text>                        │
    │ <post-file src="skript.py" name="payload.py"></post-file> │
    └─────────────────────────────────────────────────────┘
    
    ВСЕ МЕДИАФАЙЛЫ (фото/видео/архивы) КЛАДИ РЯДОМ С index.html,
    В ПУТЯХ УКАЗЫВАЙ ТОЛЬКО ИМЯ ФАЙЛА
-->
</body>
</html>
